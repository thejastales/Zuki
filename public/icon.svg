<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Midnight Blue Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f111a" />
      <stop offset="50%" stop-color="#141724" />
      <stop offset="100%" stop-color="#08090e" />
    </linearGradient>
    
    <!-- Lavender Moon Gradient -->
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d6bbfb" />
      <stop offset="100%" stop-color="#9a7cf6" />
    </linearGradient>
    
    <!-- Gold Sprout Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card Circle (for App Icon) -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Glowing Background Ambience -->
  <circle cx="256" cy="256" r="140" fill="#9a7cf6" opacity="0.15" filter="url(#glow)" />

  <g transform="translate(256, 256) scale(2.2)" filter="url(#glow)">
    <!-- Crescent Moon (Lavender) -->
    <path d="M -20 -35 A 40 40 0 1 0 35 20 A 32 32 0 1 1 -20 -35 Z" fill="url(#moonGrad)" />

    <!-- Sprouting Leaf (Gold) -->
    <path d="M -5 10 C -15 -10 -5 -30 20 -25 C 0 -15 0 5 -5 10 Z" fill="url(#goldGrad)" />
    <!-- Secondary tiny leaf sprout -->
    <path d="M -5 10 C -2 -3 8 -10 15 -3 C 5 -4 0 5 -5 10 Z" fill="url(#goldGrad)" opacity="0.85" />
    
    <!-- Sparkle star at the top -->
    <path d="M 18 -38 L 20 -32 L 26 -30 L 20 -28 L 18 -22 L 16 -28 L 10 -30 L 16 -32 Z" fill="#fef08a" />
  </g>
</svg>
